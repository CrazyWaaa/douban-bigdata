# Douban Bigdata - Docker Compose
# 重要:所有持久化数据全部位于 D 盘,严禁写到 C 盘。
#
# 使用:
#   1) 构建并启动常驻服务(mysql + backend + nginx):
#        docker compose up -d --build
#   2) 一次性跑 ETL 任务(读完即退,不会常驻):
#        docker compose --profile etl run --rm etl
#   3) 关停:
#        docker compose down
#
# 数据卷布局(全部位于 ${DATA_ROOT},默认 D:\douban-bigdata):
#   mysql-data    MySQL 数据目录
#   data/raw      爬虫输出 / ETL 输入(JSONL)
#   logs/backend  gunicorn 日志
#   dist          前端构建产物(nginx 用)
#
# 上云(Linux)时只改 DATA_ROOT,compose 文件不变。

name: douban-bigdata

services:

  mysql:
    image: mysql:8.0
    container_name: douban-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root_pwd}
      MYSQL_DATABASE: ${MYSQL_DB_NAME:-douban}
      MYSQL_USER: ${MYSQL_DB_USER:-douban}
      MYSQL_PASSWORD: ${MYSQL_DB_PASSWORD:-douban_pwd}
      TZ: Asia/Shanghai
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --default-authentication-plugin=mysql_native_password
    volumes:
      # MySQL 数据目录(必须 bind mount,避免 named volume 写 C 盘 WSL 虚拟盘)
      - ${DATA_ROOT}/mysql-data:/var/lib/mysql
      # 启动时自动建表 + 灌入种子数据
      - ./docs/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
      - ./scripts/seed-data:/docker-entrypoint-initdb.d/init:ro
    networks:
      - douban-net
    ports:
      - "${MYSQL_HOST_PORT:-3306}:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-u", "root", "-p${MYSQL_ROOT_PASSWORD:-root_pwd}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: douban-backend
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      DOUBAN_DB_HOST: mysql
      DOUBAN_DB_PORT: "3306"
      DOUBAN_DB_USER: ${MYSQL_DB_USER:-douban}
      DOUBAN_DB_PASSWORD: ${MYSQL_DB_PASSWORD:-douban_pwd}
      DOUBAN_DB_NAME: ${MYSQL_DB_NAME:-douban}
      DOUBAN_API_KEY: ${DOUBAN_API_KEY:-}
      DOUBAN_RATE_LIMIT: ${DOUBAN_RATE_LIMIT:-60/minute}
      TZ: Asia/Shanghai
    volumes:
      - ${DATA_ROOT}/logs/backend:/var/log/gunicorn
    networks:
      - douban-net
    expose:
      - "5000"

  etl:
    profiles: ["etl"]
    build:
      context: ./spark
      dockerfile: Dockerfile
    container_name: douban-etl
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      # 走 /data/raw 共享卷,绕开 HDFS(单机 demo 够用,生产可换 HDFS)
      ETL_HDFS_INPUT: /data/raw
      ETL_DB_HOST: mysql
      ETL_DB_PORT: "3306"
      ETL_DB_NAME: ${MYSQL_DB_NAME:-douban}
      ETL_DB_USER: ${MYSQL_DB_USER:-douban}
      ETL_DB_PASSWORD: ${MYSQL_DB_PASSWORD:-douban_pwd}
      ETL_SPARK_MASTER: local[*]
      ETL_SHUFFLE_PARTITIONS: "4"
      TZ: Asia/Shanghai
    volumes:
      - ${DATA_ROOT}/data/raw:/data/raw:ro
    networks:
      - douban-net

  nginx:
    image: nginx:1.27-alpine
    container_name: douban-nginx
    restart: unless-stopped
    depends_on:
      - backend
    volumes:
      - ${DATA_ROOT}/dist:/usr/share/nginx/html:ro
      - ./deploy/nginx/douban.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - douban-net
    ports:
      - "${NGINX_HOST_PORT:-8080}:80"

networks:
  douban-net:
    driver: bridge