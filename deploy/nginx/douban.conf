# Douban Bigdata - nginx 反代 + 静态托管
# gzip: 文本/JSON 走压缩,首屏/接口显著提速
# 静态资源 7d 强缓存 + immutable: vite 产物带 hash,文件名变化即失效
# /api 走 backend,长连接 + 合理超时,避免大屏首次拉数据被掐

server {
    listen 80;
    server_name _;

    client_max_body_size 20m;

    # ===== gzip 压缩 =====
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/javascript
        text/xml
        application/javascript
        application/json
        application/xml
        application/xml+rss
        application/vnd.api+json
        image/svg+xml
        font/ttf
        font/otf;

    # ===== 前端静态资源 =====
    root /usr/share/nginx/html;
    index index.html;

    # 静态资源:带 hash 的文件强缓存;index.html 走 no-cache 保证发版即生效
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        expires off;
    }
    location ~* \.(?:js|css|woff2?|ttf|otf|eot|svg|png|jpg|jpeg|gif|webp|ico)$ {
        expires 7d;
        add_header Cache-Control "public, max-age=604800, immutable" always;
        try_files $uri =404;
    }

    # SPA history 模式兜底
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ===== 图片代理(解决豆瓣图床防盗链) =====
    # 用法:/img-proxy?url=<豆瓣图片完整 URL>
    location = /img-proxy {
        # 只允许 http(s),防 SSRF
        if ($arg_url !~ "^https?://") {
            return 400;
        }
        proxy_pass $arg_url;
        proxy_http_version 1.1;
        proxy_set_header Host $proxy_host;
        proxy_set_header Referer "https://movie.douban.com/";
        proxy_set_header User-Agent "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 Chrome/128.0 Safari/537.36";
        proxy_ssl_server_name on;

        # 图片本身可缓存
        expires 7d;
        add_header Cache-Control "public, max-age=604800" always;

        proxy_connect_timeout 5s;
        proxy_read_timeout    15s;
        proxy_send_timeout    15s;
    }

    # ===== API 反代到 Flask 后端 =====
    location /api/ {
        proxy_pass http://douban-backend:5000;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection        "";

        proxy_connect_timeout 5s;
        proxy_send_timeout    30s;
        proxy_read_timeout    30s;

        # 透传错误给上游,不要 nginx 自定义错误页
        proxy_intercept_errors off;
    }

    # ===== 健康检查(可选,绕开鉴权 / 反代) =====
    location = /nginx-health {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }
}
